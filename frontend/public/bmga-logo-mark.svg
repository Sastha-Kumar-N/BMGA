  <g stroke="#67E8F9" stroke-width="1.8" stroke-linecap="round" opacity="0.85">
    <line x1="49" y1="63" x2="65" y2="54"/>
    <line x1="65" y1="54" x2="84" y2="58"/>
    <line x1="84" y1="58" x2="102" y2="70"/>
    <line x1="49" y1="63" x2="57" y2="86"/>
    <line x1="57" y1="86" x2="78" y2="88"/>
    <line x1="78" y1="88" x2="101" y2="92"/>
