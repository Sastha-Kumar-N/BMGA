<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">BMGA logo mark</title>
  <desc id="desc">India map, DNA helix, and microbial network logo mark for Bharat Microbial Genome Atlas.</desc>
  <defs>
    <radialGradient id="bg" cx="45%" cy="42%" r="70%">
      <stop offset="0" stop-color="#0EA5E9" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#0B1B3A"/>
      <stop offset="1" stop-color="#06122A"/>
    </radialGradient>
    <linearGradient id="ring" x1="16" y1="30" x2="142" y2="136">
      <stop offset="0" stop-color="#0B2F7A"/>
      <stop offset="0.48" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="helix" x1="58" y1="30" x2="96" y2="128">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.35" stop-color="#22D3EE"/>
      <stop offset="0.62" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="34" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="58" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" stroke-dasharray="122 28 68 24"/>
  <circle cx="80" cy="80" r="43" fill="none" stroke="#38BDF8" stroke-opacity="0.24" stroke-width="1.5" stroke-dasharray="5 8"/>
  <path d="M76 23c9 8 16 14 18 24 2 9-4 18-13 25-11 8-22 15-22 28 0 10 7 21 20 34" fill="none" stroke="url(#helix)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M93 27c-10 13-25 21-28 35-2 9 4 17 14 24 11 8 22 16 21 29-1 9-8 17-19 24" fill="none" stroke="url(#helix)" stroke-width="7" stroke-linecap="round"/>
  <g stroke="#E0F2FE" stroke-width="2" stroke-linecap="round">
    <line x1="68" y1="49" x2="91" y2="47"/>
    <line x1="63" y1="64" x2="86" y2="69"/>
